<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Internship Portfolio</title>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}

header {
    background: #0077b6;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    padding: 20px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
    display: inline-block;
}

.hidden {
    display: none;
}

button {
    padding: 10px;
    margin: 5px;
    border: none;
    background: #023e8a;
    color: white;
    border-radius: 5px;
    cursor: pointer;
}

img {
    width: 200px;
    margin: 10px;
    border-radius: 10px;
}
</style>
</head>

<body>

<header>
<h1>Shalukumari Shah</h1>
<p>Mechatronics Internship Portfolio</p>
</header>

<div class="container">

<!-- HOME -->
<div id="home">
    <h2>Internship Weeks</h2>

    <div class="card" onclick="openWeek(1)">Week 1</div>
    <div class="card" onclick="openWeek(2)">Week 2</div>
    <div class="card" onclick="openWeek(3)">Week 3</div>
    <div class="card" onclick="openWeek(4)">Week 4</div>
</div>

<!-- WEEK PAGE -->
<div id="weekPage" class="hidden">
    <button onclick="goHome()">⬅ Back</button>
    <h2 id="weekTitle"></h2>

    <div id="days"></div>
</div>

<!-- DAY PAGE -->
<div id="dayPage" class="hidden">
    <button onclick="backToWeek()">⬅ Back</button>
    <h2 id="dayTitle"></h2>

    <p id="dayText"></p>

    <div id="photos"></div>
</div>

</div>

<script>
let currentWeek = 1;

function openWeek(week) {
    currentWeek = week;
    document.getElementById("home").classList.add("hidden");
    document.getElementById("weekPage").classList.remove("hidden");

    document.getElementById("weekTitle").innerText = "Week " + week;

    let daysHTML = "";
    let dayNames = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    for(let i=1; i<=6; i++) {
        daysHTML += `<button onclick="openDay(${i})">Day ${i} (${dayNames[i-1]})</button>`;
    }

    document.getElementById("days").innerHTML = daysHTML;
}

function goHome() {
    document.getElementById("home").classList.remove("hidden");
    document.getElementById("weekPage").classList.add("hidden");
}

function openDay(day) {
    document.getElementById("weekPage").classList.add("hidden");
    document.getElementById("dayPage").classList.remove("hidden");

    document.getElementById("dayTitle").innerText = `Week ${currentWeek} - Day ${day}`;

    // ✏️ EDIT YOUR TEXT HERE
    document.getElementById("dayText").innerText =
        "Write what you did on this day. Example: Learned Arduino basics, built circuits, worked with sensors.";

    // 📸 EDIT YOUR IMAGES HERE
    document.getElementById("photos").innerHTML = `
        <img src="https://via.placeholder.com/200">
        <img src="https://via.placeholder.com/200">
    `;
}

function backToWeek() {
    document.getElementById("dayPage").classList.add("hidden");
    document.getElementById("weekPage").classList.remove("hidden");
}
</script>

</body>
</html>
